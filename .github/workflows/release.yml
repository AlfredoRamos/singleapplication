name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string
      message:
        description: 'Release message'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GIT_AUTHOR_NAME: ${{ secrets.GIT_AUTHOR_NAME }}
      GIT_AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Trust the key to avoid interactive prompts
          KEY_ID=$(gpg --list-keys --with-colons | grep '^pub' | cut -d':' -f5)
          echo -e "5\ny\n" | gpg --command-fd 0 --expert --edit-key "$KEY_ID" trust
        shell: bash

      # SemVer 2.0.0
      # https://semver.org
      - name: Validate version
        id: semver
        run: |
          raw="${{ inputs.version }}"
          version="${raw#v}"
          regex='^([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ ! "$version" =~ $regex ]]; then
            echo "❌ Invalid semantic version: '${version}'" >&2
            echo "🔖 Must match: MAJOR.MINOR.PATCH[-PRERELEASE][+BUILD]" >&2
            exit 1
          fi

          echo "✅ Valid semantic version: ${version}"
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Configure Git
        run: |
          git config user.name "${GIT_AUTHOR_NAME}"
          git config user.email "${GIT_AUTHOR_EMAIL}"
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d':' -f5)
          git config user.signingkey "$KEY_ID"
          git config commit.gpgsign true
          git config tag.gpgsign true

      # Strip pre-release and build metadata for CMake VERSION
      - name: Update version
        run: |
          version="${{ steps.semver.outputs.version }}"
          short_version=$(echo "${version}" | cut -d '-' -f1 | cut -d '+' -f1)
          sed -i "s/^\(project(.*VERSION \)[0-9]\+\.[0-9]\+\.[0-9]\+\(.*)\)/\1${short_version}\2/" CMakeLists.txt

      - name: Commit changes
        run: |
          git add CMakeLists.txt
          git commit -m "Release version ${{ steps.semver.outputs.version }}"
          git tag -a "${{ steps.semver.outputs.version }}" -m "${{ inputs.message }}"

      - name: Push tag
        run: |
          git push origin HEAD
          git push origin "${{ steps.semver.outputs.version }}"
